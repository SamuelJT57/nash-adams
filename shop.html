<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Shop premium apparel from HelmetHeadlifting including compression shirts and oversized shirts.">
    <title>Shop | HelmetHeadlifting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo.png" alt="Brand Logo">
        </a>
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="about.html">About</a>
    </nav>
</header>

    <main class="shop-container">
        <h1 class="page-title">Our Collection</h1>
        
        <div class="product-grid">
            
            <article class="product-card">
                <div class="product-image-wrapper">
                    <img loading="lazy" src="compShirt.jpg" alt="img" class="product-image">
                </div>
                <div class="product-info">
                    <h2 class="product-name">Compression Shirt</h2>
                    <p class="product-price">$35.00</p>
                    <button class="buy-btn">View Item</button>
                </div>
            </div>

            <article class="product-card">
                <div class="product-image-wrapper">
                    <img loading="lazy" src="bagShirt.jpg" alt="img" class="product-image">
                </div>
                <div class="product-info">
                    <h2 class="product-name">Baggy Shirt</h2>
                    <p class="product-price">$65.00</p>
                    <button class="buy-btn">View Item</button>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
