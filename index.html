<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All | HelmetHeadlifting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="logo.png" alt="Brand Logo">
        </a>
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="#">About</a>
    </nav>
</header>

    <main class="shop-container">
        <h1 class="page-title">Our Collection</h1>
        
        <div class="product-grid">
            
            <div class="product-card">
                <div class="product-image-wrapper">
                    <img src="https://via.placeholder.com/400x500" alt="Product Title" class="product-image">
                </div>
                <div class="product-info">
                    <h2 class="product-name">Heavyweight Tee</h2>
                    <p class="product-price">$35.00</p>
                    <button class="buy-btn">View Item</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image-wrapper">
                    <img src="https://via.placeholder.com/400x500" alt="Product Title" class="product-image">
                </div>
                <div class="product-info">
                    <h2 class="product-name">Over-sized Hoodie</h2>
                    <p class="product-price">$65.00</p>
                    <button class="buy-btn">View Item</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image-wrapper">
                    <img src="https://via.placeholder.com/400x500" alt="Product Title" class="product-image">
                </div>
                <div class="product-info">
                    <h2 class="product-name">Streetwear Cargoes</h2>
                    <p class="product-price">$80.00</p>
                    <button class="buy-btn">View Item</button>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
